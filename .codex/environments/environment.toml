version = 1
name = "Ceird Alchemy"

[setup]
script = "bash scripts/setup-local-environment.sh"

[cleanup]
script = "bash scripts/teardown-local-environment.sh"

[[actions]]
name = "Start Alchemy dev"
icon = "run"
command = "pnpm dev -- --stage codex-alchemy-v2-native-migration"

[[actions]]
name = "Alchemy plan"
icon = "tool"
command = "CEIRD_CLOUDFLARE=1 pnpm alchemy plan --env-file .env.local --stage codex-alchemy-v2-native-migration"

[[actions]]
name = "Plan parent Alchemy stage"
icon = "tool"
command = "CEIRD_CLOUDFLARE=1 pnpm alchemy plan --env-file .env.local --stage main"

[[actions]]
name = "Inspect parent Alchemy state"
icon = "debug"
command = "CEIRD_CLOUDFLARE=1 pnpm alchemy state tree --env-file .env.local --stage main"

[[actions]]
name = "Alchemy state tree"
icon = "debug"
command = "CEIRD_CLOUDFLARE=1 pnpm alchemy state tree --env-file .env.local --stage codex-alchemy-v2-native-migration"

[[actions]]
name = "Alchemy logs"
icon = "debug"
command = "CEIRD_CLOUDFLARE=1 pnpm alchemy logs --env-file .env.local --stage codex-alchemy-v2-native-migration"

[[actions]]
name = "Local env cleanup"
icon = "tool"
command = "bash scripts/teardown-local-environment.sh"

[[actions]]
name = "Check types"
icon = "test"
command = "pnpm check-types"

[[actions]]
name = "Run tests"
icon = "test"
command = "pnpm test"

[[actions]]
name = "Run API tests"
icon = "test"
command = "pnpm --filter api test"

[[actions]]
name = "Check all"
icon = "test"
command = "pnpm check"
