name: Build

on:
  pull_request:
  push:
    branches:
      - main

env:
  PNPM_CONFIG_OPTIONAL: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm lint

  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format Check
        run: pnpm format

  check-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type Check
        run: pnpm check-types

  react-doctor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect app React changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            react_app:
              - 'apps/app/**/*.{js,jsx,ts,tsx}'
              - 'apps/app/package.json'
              - 'apps/app/react-doctor.config.json'
              - 'pnpm-lock.yaml'

      - name: Setup pnpm
        if: steps.changes.outputs.react_app == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.changes.outputs.react_app == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        if: steps.changes.outputs.react_app == 'true'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        if: steps.changes.outputs.react_app == 'true'
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Run React Doctor
        if: steps.changes.outputs.react_app == 'true'
        run: pnpm --filter app react-doctor

  e2e:
    runs-on: ubuntu-latest
    needs:
      - check-types
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: task_tracker
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d task_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/task_tracker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Install Playwright browsers
        run: pnpm --filter app exec playwright install --with-deps chromium

      - name: Apply auth migrations
        run: pnpm --filter api db:migrate

      - name: Run E2E tests
        run: pnpm --filter app e2e

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - check-types
      - react-doctor
      - e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-workspace.yaml
            package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ensure Linux native packages
        run: node scripts/ensure-linux-native-packages.mjs

      - name: Build
        run: pnpm build
