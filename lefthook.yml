pre-commit:
  jobs:
    - name: oxfmt
      run: pnpm exec oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      glob:
        - "**/*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      stage_fixed: true
    - name: oxlint
      run: pnpm exec oxlint --fix {staged_files}
      glob:
        - "**/*.{js,jsx,ts,tsx}"
      stage_fixed: true
    - name: check-types
      run: pnpm check-types
