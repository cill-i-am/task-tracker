pre-commit:
  jobs:
    - name: oxfmt
      run: pnpm exec oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      glob:
        - "**/*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      stage_fixed: true
    - name: oxlint
      run: pnpm exec oxlint --fix --ignore-pattern 'apps/app/src/routeTree.gen.ts' {staged_files}
      glob:
        - "**/*.{js,jsx,ts,tsx}"
      stage_fixed: true
    - name: react-doctor
      run: pnpm --filter app react-doctor:staged
      glob:
        - "apps/app/**/*.{js,jsx,ts,tsx}"
        - "apps/app/package.json"
        - "apps/app/react-doctor.config.json"
    - name: check-types
      run: pnpm check-types
    - name: test
      run: pnpm -r --if-present --workspace-concurrency=1 test
